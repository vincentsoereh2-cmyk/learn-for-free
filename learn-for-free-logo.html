<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn For Free — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Light background version ── */
    .logo-light {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 60px 80px;
      background: white;
      border-radius: 24px;
    }

    /* ── Dark background version ── */
    .logo-dark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 60px 80px;
      background: #0F172A;
      border-radius: 24px;
    }

    .wordmark {
      font-weight: 700;
      font-size: 34px;
      letter-spacing: 0.18em;
      color: #2563EB;
    }
    .wordmark-dark {
      font-weight: 700;
      font-size: 34px;
      letter-spacing: 0.18em;
      color: white;
    }

    .wrapper {
      display: flex;
      gap: 60px;
      align-items: center;
      justify-content: center;
      padding: 80px;
      background: #F8FAFC;
      min-height: 100vh;
      flex-wrap: wrap;
    }

    .label {
      text-align: center;
      margin-top: 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      color: #94A3B8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Light version -->
    <div>
      <div class="logo-light" style="box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #F1F5F9;">
        <svg width="300" height="240" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g-light" x1="0" y1="0" x2="300" y2="240" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#2563EB"/>
              <stop offset="100%" stop-color="#6366F1"/>
            </linearGradient>
          </defs>

          <!-- TOP FACE: flat diamond (graduation cap board) -->
          <polygon points="150,20 285,88 150,156 15,88" fill="url(#g-light)"/>

          <!-- BOX LEFT FACE -->
          <polygon points="15,88 15,202 150,228 150,156" fill="url(#g-light)"/>

          <!-- BOX RIGHT FACE -->
          <polygon points="285,88 150,156 150,228 285,202" fill="url(#g-light)"/>

          <!-- White separator: fold line -->
          <polyline points="15,88 150,156 285,88" stroke="white" stroke-width="5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

          <!-- White separator: center vertical -->
          <line x1="150" y1="156" x2="150" y2="228" stroke="white" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <div class="wordmark">LEARN FOR FREE</div>
      </div>
      <div class="label">Light</div>
    </div>

    <!-- Dark version -->
    <div>
      <div class="logo-dark">
        <svg width="300" height="240" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g-dark" x1="0" y1="0" x2="300" y2="240" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#60A5FA"/>
              <stop offset="100%" stop-color="#818CF8"/>
            </linearGradient>
          </defs>

          <!-- TOP FACE -->
          <polygon points="150,20 285,88 150,156 15,88" fill="url(#g-dark)"/>

          <!-- BOX LEFT FACE -->
          <polygon points="15,88 15,202 150,228 150,156" fill="url(#g-dark)"/>

          <!-- BOX RIGHT FACE -->
          <polygon points="285,88 150,156 150,228 285,202" fill="url(#g-dark)"/>

          <!-- White separator: fold line -->
          <polyline points="15,88 150,156 285,88" stroke="#0F172A" stroke-width="5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

          <!-- White separator: center vertical -->
          <line x1="150" y1="156" x2="150" y2="228" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <div class="wordmark-dark">LEARN FOR FREE</div>
      </div>
      <div class="label">Dark</div>
    </div>

    <!-- Icon-only small (app icon test) -->
    <div>
      <div style="background:#F1F5F9; padding:32px; border-radius:24px; display:flex; gap:16px; align-items:center;">
        <!-- 64px -->
        <svg width="64" height="52" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g-sm1" x1="0" y1="0" x2="300" y2="240" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#2563EB"/>
              <stop offset="100%" stop-color="#6366F1"/>
            </linearGradient>
          </defs>
          <polygon points="150,20 285,88 150,156 15,88" fill="url(#g-sm1)"/>
          <polygon points="15,88 15,202 150,228 150,156" fill="url(#g-sm1)"/>
          <polygon points="285,88 150,156 150,228 285,202" fill="url(#g-sm1)"/>
          <polyline points="15,88 150,156 285,88" stroke="white" stroke-width="10" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <line x1="150" y1="156" x2="150" y2="228" stroke="white" stroke-width="10" stroke-linecap="round"/>
        </svg>
        <!-- 32px -->
        <svg width="32" height="26" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g-sm2" x1="0" y1="0" x2="300" y2="240" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#2563EB"/>
              <stop offset="100%" stop-color="#6366F1"/>
            </linearGradient>
          </defs>
          <polygon points="150,20 285,88 150,156 15,88" fill="url(#g-sm2)"/>
          <polygon points="15,88 15,202 150,228 150,156" fill="url(#g-sm2)"/>
          <polygon points="285,88 150,156 150,228 285,202" fill="url(#g-sm2)"/>
          <polyline points="15,88 150,156 285,88" stroke="white" stroke-width="14" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
          <line x1="150" y1="156" x2="150" y2="228" stroke="white" stroke-width="14" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="label">Small sizes (64px / 32px)</div>
    </div>

  </div>
</body>
</html>
